<div class="dashboard-container">
  <mat-card class="dashboard-card" appearance="outlined">
    <div class="card-glow"></div>
    <div class="dashboard-content">
      <mat-icon class="dashboard-icon">queue_music</mat-icon>
      <div class="dashboard-copy">
        <p class="eyebrow">CrowdCue</p>
        <h1>Dashboard</h1>
        <p class="subtitle">Erstelle eine neue Queue und teile sie direkt mit deinem Publikum.</p>
      </div>
      <button mat-raised-button class="create-button" (click)="createQueue()">
        <mat-icon>add_circle</mat-icon>
        Neue Queue erstellen
      </button>
    </div>
  </mat-card>
</div>
